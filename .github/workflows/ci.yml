# =============================================================
# ci.yml — Pipeline de Integração Contínua (CI)
#
# Responsabilidades:
#   · Validar mensagens de commit do Pull Request
#   · Executar testes do backend e frontend
#   · Garantir que só código validado possa ser mergeado na main
#
# Gatilho: abertura, atualização e reabertura de PRs para main
#
# Os nomes dos jobs (validate-commits, test-backend, test-frontend)
# devem ser idênticos aos status checks configurados na branch ruleset.
# =============================================================

name: CI

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

# Cancela execuções anteriores do mesmo PR ao receber novos commits
concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------
  # JOB 1: Validação de Commits
  # Verifica se todos os commits do PR seguem Conventional Commits.
  # Merge commits (ex: "Merge pull request #5") são ignorados automaticamente.
  # -----------------------------------------------------------
  validate-commits:
    name: validate-commits
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Necessario para analisar todos os commits do PR

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias de tooling
        run: npm ci --ignore-scripts

      - name: Validar mensagens de commit do PR
        # Verifica apenas os commits que estao no PR e nao estao na main.
        # O range ${{ github.event.pull_request.base.sha }}..HEAD cobre
        # exatamente os commits adicionados por este PR.
        run: |
          npx commitlint \
            --from ${{ github.event.pull_request.base.sha }} \
            --to ${{ github.event.pull_request.head.sha }} \
            --verbose
        env:
          FORCE_COLOR: '1'

  # -----------------------------------------------------------
  # JOB 2: Testes — Backend
  # Executa suite de testes da API Node.js/Express
  # -----------------------------------------------------------
  test-backend:
    name: test-backend
    runs-on: ubuntu-latest
    needs: validate-commits

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias do backend
        run: npm ci

      - name: Executar testes
        run: npm run test:run
        env:
          NODE_ENV: test
          CI: true

  # -----------------------------------------------------------
  # JOB 3: Testes — Frontend
  # Executa suite de testes React/Vite
  # -----------------------------------------------------------
  test-frontend:
    name: test-frontend
    runs-on: ubuntu-latest
    needs: validate-commits

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias do frontend
        run: npm ci

      - name: Executar testes
        run: npm run test:run
        env:
          CI: true
